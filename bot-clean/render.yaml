services:
  - type: web
    name: line-bot-competition
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.server:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
