<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融科技 & 保險比賽查詢</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card-bg: #ffffff;
    --primary: #1a56db;
    --primary-dark: #1340a8;
    --accent: #0e9f6e;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(0,0,0,.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Noto Sans TC", "PingFang TC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a3a8f 0%, #1a56db 45%, #0e9f6e 100%);
    color: #fff;
    padding: 2.5rem 1.5rem 0;
    text-align: center;
    overflow: hidden;
    position: relative;
  }
  .hero-text { position: relative; z-index: 2; }
  header h1 { font-size: 2rem; font-weight: 900; margin-bottom: .45rem; letter-spacing: -.5px; }
  header p { opacity: .88; font-size: .95rem; }
  .last-updated { margin-top: .5rem; font-size: .78rem; opacity: .65; padding-bottom: .5rem; }

  .hero-icons { display: flex; justify-content: center; gap: 2.5rem; margin-top: 1.8rem; position: relative; z-index: 2; }
  .hero-icon-wrap { display: flex; flex-direction: column; align-items: center; gap: .35rem; opacity: .92; }
  .hero-icon-circle {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    background: rgba(255,255,255,.18); backdrop-filter: blur(4px);
    border: 1.5px solid rgba(255,255,255,.3);
  }
  .hero-icon-label { font-size: .72rem; opacity: .82; font-weight: 500; }
  .hero-wave { display: block; width: 100%; margin-top: -1px; }

  .stats-strip { max-width: 960px; margin: 1.2rem auto .2rem; padding: 0 1rem; display: flex; gap: .8rem; flex-wrap: wrap; }
  .stat-pill {
    background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 999px;
    padding: .35rem .9rem; font-size: .82rem; display: flex; align-items: center; gap: .4rem;
    color: var(--text-muted); font-weight: 500;
  }
  .stat-pill span.num { color: var(--primary); font-weight: 700; }

  .controls { max-width: 960px; margin: .6rem auto .5rem; padding: 0 1rem; display: flex; flex-wrap: wrap; gap: .6rem; align-items: center; }
  .search-wrap { flex: 1 1 220px; position: relative; }
  .search-wrap input {
    width: 100%; padding: .55rem 1rem .55rem 2.4rem;
    border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem;
    background: var(--card-bg); outline: none; transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--primary); }
  .search-wrap svg { position: absolute; left: .7rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }

  .filter-group { display: flex; gap: .4rem; flex-wrap: wrap; }
  .filter-btn {
    padding: .42rem .85rem; border: 1.5px solid var(--border); border-radius: 999px;
    background: var(--card-bg); font-size: .83rem; cursor: pointer; transition: all .15s;
    color: var(--text); display: flex; align-items: center; gap: .3rem;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  select.sort-select {
    padding: .48rem .8rem; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--card-bg); font-size: .88rem; cursor: pointer; outline: none;
  }

  .count-bar { max-width: 960px; margin: 0 auto .7rem; padding: 0 1rem; font-size: .84rem; color: var(--text-muted); }

  .grid {
    max-width: 960px; margin: 0 auto 3rem; padding: 0 1rem;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: 1.1rem;
  }

  .card {
    background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; flex-direction: column; transition: transform .15s, box-shadow .15s;
    border: 1.5px solid var(--border); overflow: hidden;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.11); }

  .card-bar { height: 5px; width: 100%; }
  .bar-fintech   { background: linear-gradient(90deg, #1a56db, #6366f1); }
  .bar-insurance { background: linear-gradient(90deg, #0e9f6e, #06b6d4); }
  .bar-insurtech { background: linear-gradient(90deg, #059669, #0d9488); }
  .bar-startup   { background: linear-gradient(90deg, #7c3aed, #a855f7); }
  .bar-ai        { background: linear-gradient(90deg, #ea580c, #f59e0b); }
  .bar-digital   { background: linear-gradient(90deg, #2563eb, #0ea5e9); }
  .bar-default   { background: linear-gradient(90deg, #6b7280, #9ca3af); }

  .card-body { padding: 1.1rem 1.2rem; display: flex; flex-direction: column; gap: .55rem; flex: 1; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
  .card-icon-title { display: flex; align-items: flex-start; gap: .5rem; flex: 1; }
  .cat-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: .05rem; }
  .card-title { font-size: .97rem; font-weight: 700; line-height: 1.4; }

  .badge { flex-shrink: 0; padding: .18rem .52rem; border-radius: 999px; font-size: .7rem; font-weight: 700; white-space: nowrap; }
  .badge-open         { background: #d1fae5; color: #065f46; }
  .badge-closing_soon { background: #fef3c7; color: #92400e; }
  .badge-closed       { background: #fee2e2; color: #991b1b; }
  .badge-unknown      { background: #f3f4f6; color: #374151; }

  .card-org { font-size: .8rem; color: var(--text-muted); }
  .card-desc { font-size: .84rem; line-height: 1.6; color: #374151; flex: 1; }

  .meta-row { display: flex; flex-wrap: wrap; gap: .4rem .8rem; }
  .meta-item { display: flex; align-items: center; gap: .25rem; font-size: .77rem; color: var(--text-muted); }

  .tags { display: flex; flex-wrap: wrap; gap: .3rem; }
  .tag { padding: .16rem .52rem; border-radius: 999px; font-size: .7rem; font-weight: 500; background: #eff6ff; color: #1e40af; }
  .tag.insurance  { background: #f0fdf4; color: #166534; }
  .tag.insurtech  { background: #ecfdf5; color: #065f46; }
  .tag.startup    { background: #fdf4ff; color: #7e22ce; }
  .tag.ai         { background: #fff7ed; color: #9a3412; }
  .tag.digital    { background: #eff6ff; color: #1d4ed8; }
  .tag.blockchain { background: #fefce8; color: #713f12; }

  .prize-badge {
    display: inline-flex; align-items: center; gap: .25rem;
    font-size: .77rem; font-weight: 600; color: #92400e;
    background: #fffbeb; border-radius: 6px; padding: .18rem .5rem;
  }

  .card-footer { padding: .8rem 1.2rem; border-top: 1px solid var(--border); }
  .card-link {
    display: flex; align-items: center; justify-content: center; gap: .3rem;
    padding: .48rem .9rem; background: var(--primary); color: #fff;
    border-radius: 8px; text-decoration: none; font-size: .83rem; font-weight: 600;
    transition: background .15s;
  }
  .card-link:hover { background: var(--primary-dark); }
  .card-link-search { background: #4b5563; }
  .card-link-search:hover { background: #374151; }

  .empty { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
  .empty-icon { font-size: 3.5rem; margin-bottom: .8rem; opacity: .4; }
  .loading { text-align: center; padding: 3rem; color: var(--text-muted); font-size: .9rem; }

  footer { text-align: center; padding: 1.5rem; font-size: .78rem; color: var(--text-muted); border-top: 1px solid var(--border); }

  @media (max-width: 500px) {
    .hero-icons { gap: 1.2rem; }
    .hero-icon-circle { width: 46px; height: 46px; font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="hero-text">
    <h1>🏆 金融科技 &amp; 保險比賽查詢</h1>
    <p>自動彙整金融科技、保險科技、智慧保單相關競賽與黑客松</p>
    <div class="last-updated" id="lastUpdated">資料載入中…</div>
  </div>
  <div class="hero-icons">
    <div class="hero-icon-wrap"><div class="hero-icon-circle">💳</div><span class="hero-icon-label">金融科技</span></div>
    <div class="hero-icon-wrap"><div class="hero-icon-circle">🛡️</div><span class="hero-icon-label">保險科技</span></div>
    <div class="hero-icon-wrap"><div class="hero-icon-circle">🤖</div><span class="hero-icon-label">AI 應用</span></div>
    <div class="hero-icon-wrap"><div class="hero-icon-circle">🚀</div><span class="hero-icon-label">新創競賽</span></div>
    <div class="hero-icon-wrap"><div class="hero-icon-circle">📊</div><span class="hero-icon-label">數位金融</span></div>
  </div>
  <svg class="hero-wave" viewBox="0 0 1440 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,30 C360,60 1080,0 1440,30 L1440,60 L0,60 Z" fill="#f0f4f8"/>
  </svg>
</header>

<div class="stats-strip" id="statsStrip"></div>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
    <input type="text" id="searchInput" placeholder="搜尋比賽名稱、主辦單位…" oninput="render()">
  </div>
  <div class="filter-group" id="statusFilters">
    <button class="filter-btn active" onclick="setFilter('active',this)">🔥 進行中</button>
    <button class="filter-btn" onclick="setFilter('open',this)">🟢 報名中</button>
    <button class="filter-btn" onclick="setFilter('closing_soon',this)">🟡 即將截止</button>
    <button class="filter-btn" onclick="setFilter('all',this)">全部（含已截止）</button>
  </div>
  <div class="filter-group" id="catFilters">
    <button class="filter-btn active" onclick="setCatFilter('all',this)">所有類別</button>
    <button class="filter-btn" onclick="setCatFilter('fintech',this)">💳 金融科技</button>
    <button class="filter-btn" onclick="setCatFilter('insurance',this)">🛡️ 保險</button>
    <button class="filter-btn" onclick="setCatFilter('insurtech',this)">🔬 保險科技</button>
    <button class="filter-btn" onclick="setCatFilter('startup',this)">🚀 新創</button>
    <button class="filter-btn" onclick="setCatFilter('ai',this)">🤖 AI</button>
  </div>
  <select class="sort-select" id="sortSelect" onchange="render()">
    <option value="deadline">按截止日期</option>
    <option value="title">按名稱</option>
    <option value="status">按狀態</option>
  </select>
</div>

<div class="count-bar" id="countBar"></div>
<div class="grid" id="grid"><div class="loading">載入比賽資料中…</div></div>

<footer>
  資料每日自動更新 &bull; 藍色按鈕為直接比賽頁面，灰色按鈕為 Google 搜尋 &bull; 僅供參考
</footer>

<script>
let allData = [];
let statusFilter = 'active';
let catFilter = 'all';

const STATUS_LABEL = { open:'報名中', closing_soon:'即將截止', closed:'已截止', unknown:'查看詳情' };
const STATUS_CLASS = { open:'badge-open', closing_soon:'badge-closing_soon', closed:'badge-closed', unknown:'badge-unknown' };
const CAT_LABEL = { fintech:'金融科技', insurance:'保險', insurtech:'保險科技', startup:'新創', ai:'AI', digital:'數位金融', blockchain:'區塊鏈' };
const CAT_ICON  = { fintech:'💳', insurance:'🛡️', insurtech:'🔬', startup:'🚀', ai:'🤖', digital:'📱', blockchain:'⛓️' };
const CAT_BAR   = { fintech:'bar-fintech', insurance:'bar-insurance', insurtech:'bar-insurtech', startup:'bar-startup', ai:'bar-ai', digital:'bar-digital' };

async function loadData() {
  try {
    const res = await fetch('competitions.json?t=' + Date.now());
    const data = await res.json();
    allData = data.competitions || [];
    document.getElementById('lastUpdated').textContent = data.last_updated
      ? '資料更新時間：' + data.last_updated.replace('T',' ').slice(0,16) : '未知';
  } catch(e) {
    document.getElementById('lastUpdated').textContent = '無法載入資料';
    document.getElementById('grid').innerHTML = '<div class="empty"><div class="empty-icon">😵</div><p>無法載入比賽資料</p></div>';
  }
  updateStats(); render();
}

function updateStats() {
  const open=allData.filter(c=>c.status==='open').length;
  const soon=allData.filter(c=>c.status==='closing_soon').length;
  document.getElementById('statsStrip').innerHTML = `
    <div class="stat-pill">🏅 共 <span class="num">${allData.length}</span> 場比賽</div>
    <div class="stat-pill">🟢 報名中 <span class="num">${open}</span> 場</div>
    <div class="stat-pill">🟡 即將截止 <span class="num">${soon}</span> 場</div>`;
}

function setFilter(val,btn) {
  statusFilter=val;
  document.querySelectorAll('#statusFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setCatFilter(val,btn) {
  catFilter=val;
  document.querySelectorAll('#catFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}

function daysLeft(deadline) {
  if (!deadline) return null;
  const [y,m,d] = deadline.split('-').map(Number);
  const dl = new Date(y,m-1,d);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((dl-today)/86400000);
}

function render() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const sort  = document.getElementById('sortSelect').value;

  let items = allData.filter(c => {
    if (statusFilter==='active' && c.status!=='open' && c.status!=='closing_soon') return false;
    if (statusFilter!=='all' && statusFilter!=='active' && c.status!==statusFilter) return false;
    if (catFilter!=='all' && !(c.category||[]).includes(catFilter)) return false;
    if (query) {
      const hay=[c.title,c.organizer,c.description,...(c.category||[])].join(' ').toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });

  if (sort==='deadline') items.sort((a,b)=>(a.deadline||'9999').localeCompare(b.deadline||'9999'));
  else if (sort==='title') items.sort((a,b)=>a.title.localeCompare(b.title,'zh-TW'));
  else if (sort==='status') { const o={open:0,closing_soon:1,unknown:2,closed:3}; items.sort((a,b)=>(o[a.status]??9)-(o[b.status]??9)); }

  document.getElementById('countBar').textContent=`顯示 ${items.length} 筆 / 共 ${allData.length} 筆`;

  const grid=document.getElementById('grid');
  if (!items.length) { grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>找不到符合條件的比賽</p></div>'; return; }

  grid.innerHTML = items.map(c => {
    const status=c.status||'unknown';
    const cats=c.category||[];
    const mainCat=cats[0]||'default';
    const icon=CAT_ICON[mainCat]||'🏅';
    const barClass=CAT_BAR[mainCat]||'bar-default';

    const days=daysLeft(c.deadline);
    let deadlineText='';
    if (c.deadline) {
      deadlineText=c.deadline;
      if (days>0) deadlineText+=`（還有 ${days} 天）`;
      else if (days===0) deadlineText+='（今天截止！）';
      else if (days<0) deadlineText+='（已截止）';
    }

    const tags=cats.map(cat=>`<span class="tag ${cat}">${CAT_LABEL[cat]||cat}</span>`).join('');
    const prize=c.prize?`<div class="prize-badge">🏆 ${escHtml(c.prize)}</div>`:'';

    const searchUrl='https://www.google.com/search?q='+encodeURIComponent(c.title+' '+(c.organizer||'')+' 報名');
    const linkHref=c.url||searchUrl;
    const isSearch=!c.url;
    const linkLabel=isSearch?'搜尋此比賽':'前往比賽頁面';
    const linkIcon=isSearch
      ?`<svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>`
      :`<svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>`;

    return `
    <div class="card">
      <div class="card-bar ${barClass}"></div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-icon-title"><span class="cat-icon">${icon}</span><span class="card-title">${escHtml(c.title)}</span></div>
          <span class="badge ${STATUS_CLASS[status]}">${STATUS_LABEL[status]}</span>
        </div>
        <div class="card-org">🏢 ${escHtml(c.organizer||'')}</div>
        ${c.description?`<div class="card-desc">${escHtml(c.description)}</div>`:''}
        <div class="meta-row">
          ${deadlineText?`<span class="meta-item">📅 ${escHtml(deadlineText)}</span>`:''}
          ${prize}
        </div>
        <div class="tags">${tags}</div>
      </div>
      <div class="card-footer">
        <a class="card-link${isSearch?' card-link-search':''}" href="${escHtml(linkHref)}" target="_blank" rel="noopener">
          ${linkLabel} ${linkIcon}
        </a>
      </div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();
</script>
</body>
</html>
