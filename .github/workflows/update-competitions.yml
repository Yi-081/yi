name: 每日更新比賽資料

on:
  schedule:
    # 每天台灣時間 08:00 執行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: competitions/requirements.txt

      - name: Install dependencies
        run: pip install -r competitions/requirements.txt

      - name: Run scraper
        run: python competitions/scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add competitions/competitions.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update competitions data $(date -u +'%Y-%m-%d')"
            git push
          fi
